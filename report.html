<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Activity Report GA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0c1b3a;
            --navy2: #132244;
            --navy3: #1a2d55;
            --gold: #c9a84c;
            --gold-dim: rgba(201,168,76,0.15);
            --white: #ffffff;
            --text: #e8edf5;
            --text2: #a0b4cc;
            --text3: #6b87a8;
            --green: #10b981;
            --green-dim: rgba(16,185,129,0.12);
            --amber: #f59e0b;
            --amber-dim: rgba(245,158,11,0.12);
            --purple: #8b5cf6;
            --purple-dim: rgba(139,92,246,0.12);
            --blue: #3b82f6;
            --blue-dim: rgba(59,130,246,0.12);
            --red: #ef4444;
            --pink: #ec4899;
            --r: 14px;
            --r-sm: 8px;
        }


        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
        }

        .report-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 24px;
        }

        /* TOP HEADER BAR */
        .report-header {
            background: linear-gradient(135deg, var(--navy2), var(--navy3));
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: var(--r);
            padding: 28px 36px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        .report-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), #e8c84c, var(--gold));
        }
        .report-header-left h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--white);
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }
        .report-header-left .subtitle {
            font-size: 13px;
            color: var(--gold);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .report-header-right {
            text-align: right;
        }
        .report-header-right .org-name {
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 0.5px;
        }
        .report-header-right .org-sub {
            font-size: 11px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }


        /* DATE BAR */
        .date-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .date-display {
            background: var(--navy2);
            border: 1px solid rgba(201,168,76,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .date-nav {
            display: flex; gap: 6px;
        }
        .date-nav button {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.15);
            background: var(--navy2);
            color: var(--text2);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .date-nav button:hover {
            border-color: var(--gold);
            color: var(--gold);
            background: var(--gold-dim);
        }
        .back-link {
            margin-left: auto;
            font-size: 13px;
            color: var(--text2);
            text-decoration: none;
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            transition: all 0.15s;
        }
        .back-link:hover {
            border-color: var(--gold);
            color: var(--gold);
        }


        /* MAIN GRID */
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 1024px) {
            .report-grid { grid-template-columns: 1fr; }
        }

        /* DETAIL SECTION */
        .detail-section {
            background: var(--navy2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--r);
            padding: 24px;
        }
        .detail-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .detail-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* DEPARTMENT COLUMNS */
        .dept-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        @media (max-width: 900px) {
            .dept-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .dept-grid { grid-template-columns: 1fr; }
        }


        .dept-col {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--r-sm);
            overflow: hidden;
        }
        .dept-col-header {
            padding: 14px 12px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            position: relative;
        }
        .dept-col-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .dept-col.dept-ts .dept-col-header::before { background: var(--blue); }
        .dept-col.dept-utility .dept-col-header::before { background: var(--green); }
        .dept-col.dept-cleaning .dept-col-header::before { background: var(--amber); }
        .dept-col.dept-nrm .dept-col-header::before { background: var(--purple); }
        .dept-col.dept-ga_internal .dept-col-header::before { background: var(--pink); }

        .dept-col-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        .dept-col-name {
            font-size: 11px;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .dept-col-body {
            padding: 12px 10px;
            min-height: 120px;
        }
        .dept-activity-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 11px;
            color: var(--text2);
            line-height: 1.4;
        }
        .dept-activity-item:last-child { border-bottom: none; }
        .dept-activity-item .bullet {
            width: 4px; height: 4px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }
        .dept-activity-item .bullet.reguler { background: var(--green); }
        .dept-activity-item .bullet.additional { background: var(--amber); }
        .dept-activity-item .bullet.project { background: var(--purple); }
        .dept-activity-item .cat-badge {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
            margin-left: auto;
        }
        .cat-badge.reguler { background: var(--green-dim); color: var(--green); }
        .cat-badge.additional { background: var(--amber-dim); color: var(--amber); }
        .cat-badge.project { background: var(--purple-dim); color: var(--purple); }
        .dept-col-footer {
            padding: 10px 12px;
            border-top: 1px solid rgba(255,255,255,0.06);
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
        }


        /* SUMMARY SIDEBAR */
        .summary-sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .summary-box {
            background: var(--navy2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--r);
            padding: 20px;
        }
        .summary-box-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        /* Summary stat cards */
        .summary-stats {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .summary-stat-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: var(--r-sm);
        }
        .summary-stat-dot {
            width: 10px; height: 10px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .summary-stat-label {
            flex: 1;
            font-size: 12px;
            color: var(--text2);
            font-weight: 600;
        }
        .summary-stat-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--white);
        }
        .summary-stat-sub {
            font-size: 10px;
            color: var(--text3);
            margin-left: 4px;
        }

        /* DONUT CHART */
        .donut-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 10px 0;
        }
        .donut-svg { width: 130px; height: 130px; }
        .donut-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .legend-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text2);
        }
        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 3px;
            flex-shrink: 0;
        }
        .legend-pct {
            font-weight: 800;
            color: var(--white);
            margin-left: auto;
            min-width: 36px;
            text-align: right;
        }


        /* ANALYSIS & CONCLUSION BOTTOM */
        .bottom-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 768px) {
            .bottom-grid { grid-template-columns: 1fr; }
        }

        .analysis-box {
            background: var(--navy2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--r);
            padding: 24px;
        }
        .analysis-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .analysis-item {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .analysis-item:last-child { border-bottom: none; }
        .analysis-bullet {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--gold);
            margin-top: 6px;
            flex-shrink: 0;
        }
        .analysis-text {
            font-size: 12px;
            color: var(--text2);
            line-height: 1.6;
        }

        .conclusion-box {
            background: var(--navy2);
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: var(--r);
            padding: 24px;
            position: relative;
        }
        .conclusion-box::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: var(--gold);
            border-radius: var(--r) 0 0 var(--r);
        }
        .conclusion-box h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
        }
        .conclusion-text {
            font-size: 13px;
            color: var(--text);
            line-height: 1.8;
        }
        .focus-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .focus-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.25);
            color: var(--gold);
        }


        /* LEGEND BAR */
        .legend-bar {
            display: flex;
            gap: 24px;
            align-items: center;
            justify-content: center;
            padding: 14px 20px;
            background: var(--navy2);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--r);
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .legend-bar-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text2);
            font-weight: 600;
        }
        .legend-bar-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
        }

        /* FOOTER */
        .report-footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: var(--text3);
            border-top: 1px solid rgba(255,255,255,0.04);
        }
        .report-footer .star { color: var(--gold); }

        /* LOADING */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            gap: 12px;
            color: var(--text3);
        }
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* EMPTY */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text3);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 16px; color: var(--text2); margin-bottom: 6px; }
        .empty-state p { font-size: 13px; }

        /* PRINT */
        @media print {
            body { background: white; color: #1a1a1a; }
            .date-nav, .back-link { display: none; }
            .report-page { padding: 10px; }
        }
    </style>
</head>

<body>
<div class="report-page">
    <!-- HEADER -->
    <div class="report-header">
        <div class="report-header-left">
            <h1>DAILY ACTIVITY REPORT GA</h1>
            <div class="subtitle">Supporting Operational Excellence</div>
        </div>
        <div class="report-header-right">
            <div class="org-name">GENERAL AFFAIR</div>
            <div class="org-sub">Supporting Operational Excellence</div>
        </div>
    </div>

    <!-- DATE BAR -->
    <div class="date-bar">
        <div class="date-display" id="dateDisplay">📅 Loading...</div>
        <div class="date-nav">
            <button onclick="prevDay()" title="Hari sebelumnya">◀</button>
            <button onclick="goToday()" title="Hari ini">●</button>
            <button onclick="nextDay()" title="Hari berikutnya">▶</button>
        </div>
        <a href="/" class="back-link">← Kembali ke Input</a>
    </div>

    <!-- MAIN CONTENT -->
    <div id="reportContent">
        <div class="loading">
            <div class="spinner"></div>
            <span>Memuat laporan...</span>
        </div>
    </div>
</div>

<script>

// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const DEPARTMENTS = [
    { id: 'ts', name: 'Technical Support', icon: '🔧', color: '#3b82f6' },
    { id: 'utility', name: 'Utility', icon: '⚡', color: '#10b981' },
    { id: 'cleaning', name: 'Cleaning Service', icon: '🧹', color: '#f59e0b' },
    { id: 'nrm', name: 'NRM', icon: '📦', color: '#8b5cf6' },
    { id: 'ga_internal', name: 'GA Internal', icon: '🏢', color: '#ec4899' }
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let currentDate = todayStr();
let activities = [];
let analysisData = null;

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDateID(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
    const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
    return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function api(path) {
    const r = await fetch(window.location.origin + path);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
}


// ═══════════════════════════════════════════════════════
// DATE NAVIGATION
// ═══════════════════════════════════════════════════════
function prevDay() { currentDate = addDays(currentDate, -1); loadReport(); }
function nextDay() { currentDate = addDays(currentDate, 1); loadReport(); }
function goToday() { currentDate = todayStr(); loadReport(); }

// ═══════════════════════════════════════════════════════
// LOAD REPORT DATA
// ═══════════════════════════════════════════════════════
async function loadReport() {
    document.getElementById('dateDisplay').innerHTML = `📅 ${formatDateID(currentDate)}`;
    document.getElementById('reportContent').innerHTML = `
        <div class="loading"><div class="spinner"></div><span>Memuat laporan...</span></div>`;

    try {
        const [activitiesData, analysis] = await Promise.all([
            api(`/api/activities?startDate=${currentDate}&endDate=${currentDate}`),
            api(`/api/analysis?date=${currentDate}`)
        ]);

        activities = activitiesData.map(a => ({
            id: a.id,
            department: a.department,
            activity: a.activity,
            category: a.category,
            status: a.status,
            notes: a.notes || '',
            date: a.created_at
        }));

        analysisData = analysis;
        renderReport();
    } catch(e) {
        console.error('Load error:', e);
        document.getElementById('reportContent').innerHTML = `
            <div class="empty-state">
                <div class="icon">⚠️</div>
                <h3>Gagal memuat laporan</h3>
                <p>${e.message}</p>
            </div>`;
    }
}


// ═══════════════════════════════════════════════════════
// RENDER FULL REPORT
// ═══════════════════════════════════════════════════════
function renderReport() {
    if (activities.length === 0) {
        document.getElementById('reportContent').innerHTML = `
            <div class="empty-state">
                <div class="icon">📭</div>
                <h3>Belum ada aktivitas</h3>
                <p>Belum ada data aktivitas untuk tanggal ${formatDateID(currentDate)}.</p>
            </div>`;
        return;
    }

    const summary = analysisData ? analysisData.summary : null;
    const analysis = analysisData ? analysisData.analysis : [];
    const conclusion = analysisData ? analysisData.conclusion : '';

    const total = activities.length;
    const reguler = activities.filter(a => a.category === 'reguler').length;
    const additional = activities.filter(a => a.category === 'additional').length;
    const project = activities.filter(a => a.category === 'project').length;

    const regPct = total ? Math.round(reguler/total*100) : 0;
    const addPct = total ? Math.round(additional/total*100) : 0;
    const prjPct = total ? (100 - regPct - addPct) : 0;

    // Build department columns
    const deptCols = DEPARTMENTS.map(dept => {
        const deptActivities = activities.filter(a => a.department === dept.id);
        const items = deptActivities.map(a => `
            <div class="dept-activity-item">
                <div class="bullet ${a.category}"></div>
                <span>${a.activity}</span>
                <span class="cat-badge ${a.category}">${a.category.toUpperCase().substring(0,3)}</span>
            </div>
        `).join('');

        return `
        <div class="dept-col dept-${dept.id}">
            <div class="dept-col-header">
                <div class="dept-col-icon">${dept.icon}</div>
                <div class="dept-col-name">${dept.name}</div>
            </div>
            <div class="dept-col-body">
                ${items || '<div style="text-align:center;color:var(--text3);font-size:11px;padding:20px 0">Tidak ada aktivitas</div>'}
            </div>
            <div class="dept-col-footer">Total ${deptActivities.length} Activity</div>
        </div>`;
    }).join('');


    // Donut SVG
    const donutSvg = buildDonut(regPct, addPct, prjPct, total);

    // Analysis items
    const analysisItems = analysis.map(text => `
        <div class="analysis-item">
            <div class="analysis-bullet"></div>
            <div class="analysis-text">${text}</div>
        </div>
    `).join('');

    // Focus tags from active departments
    const activeDepts = DEPARTMENTS.filter(d => activities.some(a => a.department === d.id));
    const focusTags = activeDepts.map(d => `<span class="focus-tag">${d.icon} ${d.name}</span>`).join('');

    document.getElementById('reportContent').innerHTML = `
        <!-- LEGEND -->
        <div class="legend-bar">
            <div class="legend-bar-item"><div class="legend-bar-dot" style="background:var(--green)"></div> REGULER — Pekerjaan rutin / berulang</div>
            <div class="legend-bar-item"><div class="legend-bar-dot" style="background:var(--amber)"></div> ADDITIONAL — Pekerjaan tambahan / non rutin</div>
            <div class="legend-bar-item"><div class="legend-bar-dot" style="background:var(--purple)"></div> PROJECT — Pekerjaan berbasis project / improvement</div>
        </div>

        <!-- MAIN GRID -->
        <div class="report-grid">
            <!-- LEFT: DETAIL -->

// ═══════════════════════════════════════════════════════
// DONUT CHART SVG
// ═══════════════════════════════════════════════════════
function buildDonut(regPct, addPct, prjPct, total) {
    const r = 50, cx = 65, cy = 65;
    const circumference = 2 * Math.PI * r;

    function arc(pct, offset, color) {
        if (pct <= 0) return '';
        const dash = circumference * pct / 100;
        const gap = circumference - dash;
        const startOffset = -(circumference * offset / 100);
        return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="16"
            stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${startOffset}"
            transform="rotate(-90 ${cx} ${cy})" />`;
    }

    return `
        <svg class="donut-svg" viewBox="0 0 130 130">
            ${arc(regPct, 0, '#10b981')}
            ${arc(addPct, regPct, '#f59e0b')}
            ${arc(prjPct, regPct + addPct, '#8b5cf6')}
            <text x="${cx}" y="${cy - 4}" text-anchor="middle" fill="white" font-size="22" font-weight="800">${total}</text>
            <text x="${cx}" y="${cy + 14}" text-anchor="middle" fill="#6b87a8" font-size="9" font-weight="700">TOTAL</text>
        </svg>
    `;
}
